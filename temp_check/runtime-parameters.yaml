    default: 150
    required: true
  - key: indoor-space-batch-size
    displayed-name: Indoor Space Batch Size
    type: integer
    default: 40
    required: true
  - key: provider-location-batch-size
    displayed-name: Provider Location Batch Size
    type: integer
    default: 200
    required: true
  - key: region-batch-size
    displayed-name: Region Batch Size
    type: integer
    default: 100
    required: true
  - key: wire-center-batch-size
    displayed-name: Wire Center Batch Size
    type: integer
    default: 50
    required: true
  - key: cleanup-seq
    displayed-name: Order of migration types for cleanup
