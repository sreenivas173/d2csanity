id: {{ .MigrationType | ToLower }}
version: {{ .Version }}
description: |
  {{ .Description | Indent 2 }}
actions:

{{ $d := . -}}
{{ $SourceSystem := .SourceSystem -}}
{{ $loadDataStep := .GetVariable "load-data-step" -}}
{{ $batchMode := .BatchMode -}}

{{if gt (len $.SourceValidation.Items) 0 }}
  - id: validate-source
    description: action for performing source validations
    steps:
      - id: validate-source-data
        description:
        processor: sql-validator
        config:
          source-system: {{ $SourceSystem | ToLower }}
          execute: 
            filename: validate_source_data_execute.sql
            parameters:
              - name: session_id
                value: $['session-id']
          select: 
            filename: validate_source_data_select.sql
            parameters:
              - name: session_id
                value: $['session-id']
{{end}}

  - id: batching
    description: |
      Action for preparing batches.
      It creates table and fulfills with info about batches.
      Returns batch amounts and total amount of migration objects.
    output:
      - batch-amount
    steps:
    {{- if ne $batchMode "single" }}
      - id: prepare-batches
        description: create and fulfills table based on scoping rule 
        processor: sql
        config:
          filename: declare_functions.sql
          source-system: {{ $SourceSystem }}
          type: execute
          parameters:
            - name: batch_size
              value: $.params['batch-size']
            - name: configuration_id
              value: $.configuration
            - name: descriptor_id
              value: $.descriptor
    {{- end }}
      - id: perform-batching-and-get-estimation
        description: divide scope into batches and calculate estimations
        processor: sql
        config:
          filename: perform_batching_and_get_estimation.sql
          source-system: {{ $SourceSystem }}
          type: select
        {{- if eq $batchMode "built-in" }}
          parameters:
            - name: configuration_id
              value: $.configuration
            - name: descriptor_id
              value: $.descriptor
            - name: get_first_batch
              value: $.params['get-first-batch']
        {{- end }}
        output:
          - name: batch-amount


  - id: migrate-batch
    description: action for performing batch migration
    params:
      - name: batch-id
        description: sequential number of batch
    steps:
    {{- range $key, $item := .Data }}
      {{- if gt (len $item.ExtractionRule) 0 }}
      - id: extract-{{ $item.ItemType | ToLower }}
        description: |
{{ $item.ExtractionRuleDescription | Indent 10 }}
        processor: sql
        config:
          filename: extract_{{ ReplaceAll $item.ItemType "-" "_" | ToLower }}.sql
          source-system: {{ $SourceSystem | ToLower }} 
          type: select
          parameters:
              {{- if ne $batchMode "single" }}
            - name: batch_id
              value: $.params['batch-id']
               {{- end }}
            - name: configuration_id
              value: $.configuration
            - name: descriptor_id
              value: $.descriptor
        output:
          - name: raw-{{ $item.ItemType | ToLower }}
      {{- end }}
    {{ end }}
      - id: aggregate-data
        description: |
{{ .RootType.AggregationRuleDescription | Indent 10 }}
        processor: aggregate
        config:
          root: raw-{{ .RootType.ItemType | ToLower }}
          migr-id: {{ .RootType.ExtractedObjectKey }}
          migr-type: {{ .MigrationType | ToLower }}
          {{- if gt (len .AggregationRules) 0 }}
          rules: 
            {{- range .AggregationRules }}
            - parent: {{ Marshal .Parent | ToLower }}
              parent-key-field: {{ .ParentKeyField }}
              child: {{ .Child | ToLower }}
              child-ref-field: {{ .ChildRefField }}
              aggregation-field: {{ .AggregationField }}
            {{ end }}
          {{- end }}
        input: 
        {{- range $key, $item := .Data }}
          {{- if gt (len $item.ExtractionRule) 0 }}
          - name: raw-{{ $item.ItemType | ToLower }}
          {{- end }}
        {{- end }}
        output:
          - name: extracted-data
      {{ if gt (len .ExtractedValidation.SeverityList) 0 }}
      - id: validate-extracted-data
        description:
        processor: json-schema
        config:
          severity:
          {{- range .ExtractedValidation.SeverityList }}
            - level: {{ ToLower . }}
              filename: {{ ToLower . }}_validate_extracted_data.json
          {{- end }}
          type: extracted
        input:
          - name: extracted-data
        output:
          - name: valid-extracted-data
          - name: failed-extracted-data
          - name: extracted-data-fallouts
      {{ end }}
      - id: transform-data
        description: |
{{ .RootType.TransformationRuleDescription | Indent 10 }}
        processor: template
        config:
          filename: transformation_rule_{{ ReplaceAll .MigrationType "-" "_" | ToLower }}.json
        input:
        {{- if gt (len .ExtractedValidation.SeverityList) 0 }}
          - name: valid-extracted-data
          - name: extracted-data-fallouts
        {{- else }}
          - name: extracted-data
        {{- end }}
        output:
          - name: transformed-data
          - name: failed-transformed-data
          - name: transformed-fallouts

      {{ if gt (len .TargetValidation.SeverityList) 0 }}
      - id: validate-transformed-data
        description:
        processor: json-schema
        config:
          severity:
          {{- range .TargetValidation.SeverityList }}
            - level: {{ ToLower . }}
              filename: {{ ToLower . }}_validate_transformed_data.json
          {{- end }}
          type: transformed
        input:
          - name: transformed-data
        output:
          - name: valid-transformed-data
          - name: failed-transformed-data
          - name: transformed-data-fallouts
      {{ end }}

{{- if and (eq $loadDataStep "true") (ne ($d.GetVariable "load-data-processor") "") }}
      - id: load-data
        description: "Load prepared data into the target system"
      {{- if ne ( $d.GetVariable "load-data-processor") "" }}
        processor: {{ $d.GetVariable "load-data-processor" }}
      {{- else }}
        processor: "python"
      {{- end }} 
        config:
      {{- if eq ($d.GetVariable "load-data-processor") "python" }}
          filename: load_data.py
      {{- else if eq ($d.GetVariable "load-data-processor") "oss-yang-inventory" }}
          context:
            {{- if ne ($d.GetVariable "oss-inventory") "" }}
            inventory: {{ $d.GetVariable "oss-inventory" }}
            {{- end }}  
          configuration:
            {{- if ne ($d.GetVariable "generate-names") "" }}
            generate-names: {{ $d.GetVariable "generate-names" }}
            {{- else }}
            generate-names: false
            {{- end }} 
            {{- if ne ($d.GetVariable "dl-enrichment") "" }}
            dl-enrichment: {{ $d.GetVariable "dl-enrichment" }}
            {{- else}}
            dl-enrichment: false
            {{- end}}
      {{- end }} 
        input:
        {{- if gt (len .TargetValidation.SeverityList) 0 }}
          - name: valid-transformed-data
          - name: transformed-data-fallouts
        {{- else }}
          - name: transformed-data
        {{- end }}
        output:
          - name: load-result-data
          - name: load-fallouts
    {{- end }}

  - id: extract-validate-transform
    description: action for performing batch migration from extraction and to trasformation
    params:
      - name: batch-id
        description: sequential number of batch
    steps:
    {{- range $key, $item := .Data }}
      {{- if gt (len $item.ExtractionRule) 0 }}
      - id: source-extraction-{{ $item.ItemType | ToLower }}
        description: |
{{ $item.ExtractionRuleDescription | Indent 10 }}
        processor: sql
        config:
          filename: extract_{{ ReplaceAll $item.ItemType "-" "_" | ToLower }}.sql
          source-system: {{ $SourceSystem | ToLower }} 
          type: select
          parameters:
              {{- if ne $batchMode "single" }}
            - name: batch_id
              value: $.params['batch-id']
              {{- end }}
            - name: configuration_id
              value: $.configuration
            - name: descriptor_id
              value: $.descriptor
        output:
          - name: raw-{{ $item.ItemType | ToLower }}
      {{- end }}
    {{ end }}
      - id: aggregate-data
        description: |
{{ .RootType.AggregationRuleDescription | Indent 10 }}
        processor: aggregate
        config:
          root: raw-{{ .RootType.ItemType | ToLower }}
          migr-id: {{ .RootType.ExtractedObjectKey }}
          migr-type: {{ .MigrationType | ToLower }}
          {{- if gt (len .AggregationRules) 0 }}
          rules: 
            {{- range .AggregationRules }}
            - parent: {{ Marshal .Parent | ToLower }}
              parent-key-field: {{ .ParentKeyField }}
              child: {{ .Child | ToLower }}
              child-ref-field: {{ .ChildRefField }}
              aggregation-field: {{ .AggregationField }}
            {{ end }}
          {{- end }}
        input: 
        {{- range $key, $item := .Data }}
          {{- if gt (len $item.ExtractionRule) 0 }}
          - name: raw-{{ $item.ItemType | ToLower }}
          {{- end }}
        {{- end }}
        output:
          - name: extracted-data
      {{ if gt (len .ExtractedValidation.SeverityList) 0 }}
      - id: validate-extracted-data
        description:
        processor: json-schema
        config:
          severity:
          {{- range .ExtractedValidation.SeverityList }}
            - level: {{ ToLower . }}
              filename: {{ ToLower . }}_validate_extracted_data.json
          {{- end }}
          type: extracted
        input:
          - name: extracted-data
        output:
          - name: valid-extracted-data
          - name: failed-extracted-data
          - name: extracted-data-fallouts
      {{ end }}
      - id: transform-data
        description: |
{{ .RootType.TransformationRuleDescription | Indent 10 }}
        processor: template
        config:
          filename: transformation_rule_{{ ReplaceAll .MigrationType "-" "_" | ToLower }}.json
        input:
        {{- if gt (len .ExtractedValidation.SeverityList) 0 }}
          - name: valid-extracted-data
          - name: extracted-data-fallouts
        {{- else }}
          - name: extracted-data
        {{- end }}
        output:
          - name: transformed-data
          - name: failed-transformed-data
          - name: transformed-fallouts

      {{ if gt (len .TargetValidation.SeverityList) 0 }}
      - id: validate-transformed-data
        description:
        processor: json-schema
        config:
          severity:
          {{- range .TargetValidation.SeverityList }}
            - level: {{ ToLower . }}
              filename: {{ ToLower . }}_validate_transformed_data.json
          {{- end }}
          type: transformed
        input:
          - name: transformed-data
        output:
          - name: valid-transformed-data
          - name: failed-transformed-data
          - name: transformed-data-fallouts
      {{ end }}

  
{{- if and (eq $loadDataStep "true") (ne ($d.GetVariable "load-data-processor") "") }}
  - id: store-data
    description: |
      Action for loading transformed data into the target system
    output:
      - load-result-data
    steps:
      - id: transformed-extraction
        description: "Load data from a table into JSON format"
        processor: mdc
        config:
          table-name: transformed_data
          migr-type: $.descriptor
          parameters:
            - name: migr-type
              value: {{ .MigrationType | ToLower }}
            - name: table_name
              value: $.params['table-name']
              {{- if ne $batchMode "single" }}              
            - name: batch_id
              value: $.params['batch-id']
              {{- end }}
        output:
          - name: mdc-transformed-data
      - id: load-data
        description: "Load prepared JSON data into the target system"
      {{- if ne ($d.GetVariable "load-data-processor") "" }}
        processor: {{ $d.GetVariable "load-data-processor" }}
      {{- else }}
        processor: "python"
      {{- end }} 
        config:

      {{- if eq ($d.GetVariable "load-data-processor") "python" }}
          filename: load_data.py
      {{- else if eq ($d.GetVariable "load-data-processor") "oss-yang-inventory" }}
          context:
            {{- if ne (.GetVariable "oss-inventory") "" }}
            inventory: {{ $d.GetVariable "oss-inventory" }}
            {{- end }}  
          configuration:
            {{- if ne ($d.GetVariable "generate-names") "" }}
            generate-names: {{ .GetVariable "generate-names" }}
            {{- else }}
            generate-names: false
            {{- end }} 
            {{- if ne ($d.GetVariable "dl-enrichment") "" }}
            dl-enrichment: {{ $d.GetVariable "dl-enrichment" }}
            {{- else}}
            dl-enrichment: false
            {{- end}}
      {{- end }} 
        input:
          - name: mdc-transformed-data
        output:
          - name: load-result-data
          - name: load-fallouts
  {{- end }}

{{- if and (eq $loadDataStep "true") (ne ($d.GetVariable "load-data-processor") "") }}
  - id: technical-retry
    description: |
      Action for uploading transformed data in statuses Failed and In-progress into target system.
    output:
      - load-result-data
    steps:
      - id: get-transformed-missed
        description: "Get transformed data from MDC db into JSON format"
        processor: mdc
        config:
          filename: perform_batching_and_get_estimation.sql
        output:
          - name: previously-missed-data

      - id: load-data
        description: "Upload previously unprocessed data into target system"
      {{- if ne ($d.GetVariable "load-data-processor") "" }}
        processor: {{ $d.GetVariable "load-data-processor" }}
      {{- else }}
        processor: "python"
      {{- end }} 
        config:
      {{- if eq ($d.GetVariable "load-data-processor") "python" }}
          filename: load_data.py
      {{- else if eq ($d.GetVariable "load-data-processor") "oss-yang-inventory" }}
          context:
            {{- if ne (.GetVariable "oss-inventory") "" }}
            inventory: {{ $d.GetVariable "oss-inventory" }}
            {{- end }}  
          configuration:
            {{- if ne ($d.GetVariable "generate-names") "" }}
            generate-names: {{ .GetVariable "generate-names" }}
            {{- else }}
            generate-names: false
            {{- end }} 
            {{- if ne ($d.GetVariable "dl-enrichment") "" }}
            dl-enrichment: {{ $d.GetVariable "dl-enrichment" }}
            {{- else}}
            dl-enrichment: false
            {{- end}}
      {{- end }} 

        input:
          - name: previously-missed-data
        output:
          - name: load-result-data
          - name: load-fallouts
{{- end }}

  - id: cleanup
    description: action for cleanup target system
    steps:
      - id: cleanup
        description: step that performs cleanup for target system
        processor: cleanup
        config:
          filename: cleanup.py
          batch-size: 100
