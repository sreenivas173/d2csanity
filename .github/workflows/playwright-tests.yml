name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Test tag to run (e.g., @smoke, @regression)'
        required: false
        default: ''
      environment:
        description: 'Environment to test'
        required: false
        default: 'QA1'
        type: choice
        options:
          - QA1

env:
  NODE_VERSION: '18'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run Playwright tests
        run: |
          if [ -n "${{ github.event.inputs.test_tag }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.test_tag }}" --project=${{ github.event.inputs.environment || 'QA1' }}
          else
            npx playwright test --project=${{ github.event.inputs.environment || 'QA1' }}
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          EMAIL: ${{ secrets.TEST_EMAIL }}
          PASSWORD: ${{ secrets.TEST_PASSWORD }}
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-shard-${{ matrix.shard }}
          path: screenshots/
          retention-days: 7
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 30
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create summary report
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          total_passed=0
          total_failed=0
          total_skipped=0
          
          for dir in artifacts/test-results-*/; do
            if [ -f "$dir/index.json" ]; then
              passed=$(jq '.stats.passed // 0' "$dir/index.json" 2>/dev/null || echo 0)
              failed=$(jq '.stats.failed // 0' "$dir/index.json" 2>/dev/null || echo 0)
              skipped=$(jq '.stats.skipped // 0' "$dir/index.json" 2>/dev/null || echo 0)
              
              total_passed=$((total_passed + passed))
              total_failed=$((total_failed + failed))
              total_skipped=$((total_skipped + skipped))
            fi
          done
          
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $total_passed |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $total_failed |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️ Skipped | $total_skipped |" >> $GITHUB_STEP_SUMMARY
      
      - name: Display test results
        if: needs.test.result == 'failure'
        run: |
          echo "❌ Some tests failed. Please check the artifacts for details."
          exit 1
