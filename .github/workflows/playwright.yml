name: CMT Sanity Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted

    steps:
    # Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup Node
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # Install dependencies
    - name: Install dependencies
      run: npm ci

    # Install Playwright browsers
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Run tests
    - name: Run D2C Sanity Tests
      run: npx playwright test -g "@sanity" --project=QA1_D2C
    # Run tests
    - name: Run MM Sanity Tests
      run: npx playwright test -g "@MMsanity" --project=QA1_MM

    # Upload report (optional download)
    - name: Upload Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/

    # ✅ Deploy HTML report to gh-pages (NO WSL, NO gh-pages npm)
    - name: Deploy HTML Report to GitHub Pages
      if: always()
      shell: powershell
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        Write-Host "Preparing clean gh-pages folder..."

        # Create clean folder
        New-Item -ItemType Directory -Force -Path deploy

        # Copy only HTML report
        Copy-Item -Path "playwright-report\*" -Destination "deploy\" -Recurse -Force

        Set-Location deploy

        git init
        git checkout -b gh-pages

        git add .
        git commit -m "Deploy Playwright HTML Report"

        Write-Host "Pushing to GitHub..."

        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages --force

    # Send Webex notification
    - name: Send Webex Notification
      if: always()
      run: node sendWebex.js
      env:
        WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
        WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

