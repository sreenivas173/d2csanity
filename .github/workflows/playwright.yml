name: Sanity Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
    # Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup Node
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # Install dependencies
    - name: Install dependencies
      run: npm ci

    # Install Playwright browsers
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Run tests
    - name: Run Sanity Tests
      run: npx playwright test -g "@sanity" --project=QA1_D2C

    # Upload report (optional download)
    - name: Upload Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/

    # ✅ Deploy HTML report to gh-pages (NO WSL, NO gh-pages npm)
    - name: Deploy HTML Report to GitHub Pages
      if: always()
      shell: powershell
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        Write-Host "Cloning repo..."
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages

        Set-Location gh-pages

        Write-Host "Switching to gh-pages branch..."
        if (git branch --list gh-pages) {
          git checkout gh-pages
        } else {
          git checkout --orphan gh-pages
        }

        Write-Host "Cleaning old files..."
        try {
          git rm -rf .
        } catch {
          Write-Host "Nothing to clean"
        }

        Set-Location ..

        Write-Host "Checking report folder..."
        if (-Not (Test-Path "playwright-report")) {
          Write-Error "playwright-report folder not found"
          exit 1
        }

        Write-Host "Copying report..."
        Copy-Item -Path "playwright-report\*" -Destination "gh-pages\" -Recurse -Force

        Set-Location gh-pages

        git add .

        Write-Host "Committing..."
        git commit -m "Update Playwright HTML report" -ErrorAction SilentlyContinue

        Write-Host "Pushing..."
        git push origin gh-pages --force

    # Send Webex notification
    - name: Send Webex Notification
      if: always()
      run: node sendWebex.js
      env:
        WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
        WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

