name: Sanity Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
    # Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup Node
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # Install dependencies
    - name: Install dependencies
      run: npm ci

    # Install Playwright browsers
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Run tests
    - name: Run Sanity Tests
      run: npx playwright test -g "@sanity" --project=QA1_D2C

    # Upload report (optional download)
    - name: Upload Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/

    # ✅ Deploy HTML report to gh-pages (NO WSL, NO gh-pages npm)
    - name: Deploy HTML Report to GitHub Pages
      if: always()
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        echo "Cloning repo..."
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages

        cd gh-pages

        echo "Switching branch..."
        git checkout gh-pages || git checkout --orphan gh-pages

        echo "Cleaning old files..."
        git rm -rf . || echo "Nothing to clean"

        cd ..

        echo "Removing long-path folder..."
        rmdir /s /q test-results || echo "No test-results folder"

        echo "Copying report..."
        xcopy playwright-report\* gh-pages\ /E /H /C /I

        cd gh-pages

        echo "Adding files..."
        git add .

        git commit -m "Update Playwright HTML report" || echo "No changes to commit"

        echo "Pushing to gh-pages..."
        git push origin gh-pages --force

    # Send Webex notification
    - name: Send Webex Notification
      if: always()
      run: node sendWebex.js
      env:
        WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
        WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}