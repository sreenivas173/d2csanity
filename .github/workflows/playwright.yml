name: Sanity Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Sanity Tests
      run: npx playwright test -g "@sanity" --project=QA1_D2C

    # ✅ Upload report FIRST
    - name: Upload Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/

    # ✅ Deploy to GitHub Pages
    - name: Deploy Playwright Report to GitHub Pages
      if: always()
      run: |
        npm install -g gh-pages
        npx gh-pages -d playwright-report
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ✅ Send Webex Notification LAST
    - name: Send Webex Notification
      if: always()
      run: node sendWebex.js
      env:
        WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
        WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}