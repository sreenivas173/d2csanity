<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengubah Warna Latar Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pengubah Warna Latar Website</h1>
        <p>Pilih warna untuk mengubah latar belakang halaman ini:</p>
        <input type="color" id="colorPicker" value="#ffffff">
        <div id="colorDisplay">
            <p>Warna latar saat ini: <span id="currentColor">#ffffff</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
